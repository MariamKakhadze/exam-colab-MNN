<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <section class="player">
        <div class="player-cont">
            <div class="left-cont">
                <button class="btn-playback">
                    <img src="" alt="Start">
                    <img src="" alt="Pause">
                </button>
                <button class="player-prev">
                    <img src="" alt="Previous">
                    <img src="" alt="prev-hoover">
                </button>
                <button class="player-next">
                    <img src="" alt="Next">
                    <img src="" alt="next-hoover">
                </button>
                <button class="shuffle">
                    <img src="" alt="Shuffle">
                    <img src="" alt="shuffle-hoover">
                </button>
                <button class="repeat">
                    <img src="" alt="Repeat">
                    <img src="" alt="repeat-hoover">
                </button>
                <span class="left-time">2:23</span>
                <button class="playback-bar">
                    <img src="" alt="player">
                    <img src="" alt="player">
                </button>
                <span class="left-time">4:45</span>
                <label class="volume">
                    <input type="range" name="volume" id="volume">
                    <img src="" alt="Volume">
                </label>
            </div>
            <div class="right-cont">
                <a class="cover" href="">
                    <img src="" alt="cover">
                </a>
                <div class="song-btn">
                    <a class="song" href=""> <span></span></a>
                    <a class="artist" href=""></a>
                    <a class="album" href=""></a>
                </div>
                <button class="favorite">
                    <img src="" alt="Favorite">
                </button>
                <div class="add-btn">
                    <input type="checkbox" id="add-toggle" class="toogle-input">
                    <label for="add-toggle" class="add-btn">
                        <img src="" alt="Add">
                    </label>
                    <label for="add-toggle" class="add-backdrop"></label>
                    <div class="add-window">
                        <div class="add-header">
                            <span>Add to playlist</span>
                            <hr>
                            <div class="add-search">
                                <input type="text" placeholder="Search for a playlist/folder">
                                <img src="" alt="Search">
                            </div>
                            <button class="new-list">
                                <img src="" alt="New Playlist">
                                <span>New Playlist</span>
                            </button>
                            <div class="playlists">
                                <img src="" alt="Playlist">
                                <span></span>
                                <button class="add-to-list">
                                    <img src="" alt="Add">
                                    <img src="" alt="Add-hoover">
                                </button>
                            </div>
                            <div class="playlists">
                                <img src="" alt="Playlist">
                                <span></span>
                                <button class="add-to-list">
                                    <img src="" alt="Add">
                                    <img src="" alt="Add-hoover">
                                </button>
                            </div>
                            <div class="playlists">
                                <img src="" alt="Playlist">
                                <span></span>
                                <button class="more">
                                    <img src="" alt="More">
                                </button>
                            </div>
                            <div class="playlists">
                                <img src="" alt="Playlist">
                                <span></span>
                                <button class="add-to-list">
                                    <img src="" alt="Add">
                                    <img src="" alt="Add-hoover">
                                </button>
                            </div>
                            <hr>
                            <div class="playlist-btn"
                                <button class="Cancel">Cancel</button>
                                <button class="Done">Done</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lyrics-btn">
                    <input type="checkbox" id="lyrics-toggle" class="toogle-input">
                    <label for="lyrics-toggle" class="lyrics-btn">
                        <img src="" alt="Lyrics">
                    </label>
                    <label for="lyrics-toggle" class="lyrics-backdrop">
                    <div class="lyrics-window">
                        <div class="lyrics-header">
                            <span>Lyrics</span>
                            <img src="" alt="Lyrics">
                            <button class="sync">
                                <img src="" alt="Sync">
                                <img src="" alt="sync-hoover">
                            </button>
                            <img src="" alt="Share">
                        </div>
                        <hr>
                        <div class="lyrics-content">
                            <p></p>
                            <p></p>
                    </div>
                </div>
                <button class="devices">
                    <img src="" alt="Devices">
                    <img src="" alt="devices-hoover">
                </button>
                <div class="queue">
                    <button class="queue-btn">
                        <img src="" alt="Queue">
                    <div class="queue-dropdown">
                        <ul>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                            <li><img src="" alt="list"></li>
                        </ul>
                    </div>
                </div>
        </div>
    </section>
</body>
</html>
